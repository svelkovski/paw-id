<a
  [routerLink]="['/dogs', dog.id]"
  class="group relative block aspect-[3/4] overflow-hidden rounded-lg bg-bg-secondary border border-border-tertiary/50 transition-transform duration-200 hover:-translate-y-1"
>
  @if (photoUrl; as photo) {
    <img
      [src]="photo"
      [alt]="dog.displayName"
      loading="lazy"
      class="absolute inset-0 w-full h-full object-cover object-top transition-transform duration-500 group-hover:scale-105"
    />
  } @else {
    <div
      class="absolute inset-0 bg-bg-tertiary flex items-center justify-center"
    >
      <svg
        class="w-20 h-20 opacity-60"
        viewBox="0 0 48 48"
        fill="none"
        aria-hidden="true"
      >
        <circle cx="24" cy="24" r="22" fill="#33332F" />
        <ellipse cx="24" cy="28" rx="12" ry="10" fill="#55534D" />
        <circle cx="24" cy="18" r="8" fill="#55534D" />
        <circle cx="20" cy="16" r="3" fill="#1C1C1A" />
        <circle cx="28" cy="16" r="3" fill="#1C1C1A" />
        <ellipse cx="24" cy="22" rx="4" ry="2.5" fill="#1C1C1A" />
      </svg>
    </div>
  }

  <div
    class="absolute inset-0 bg-gradient-to-b from-black/20 via-black/40 to-black/80"
    aria-hidden="true"
  ></div>

  <span [class]="badgeClass" class="absolute top-3 left-3 z-10">
    {{ badgeLabel }}
  </span>

  <div class="absolute inset-0 flex flex-col justify-end p-5">
    <h3
      class="text-white font-bold text-2xl leading-[1.05] tracking-tight uppercase drop-shadow-[0_2px_8px_rgba(0,0,0,0.5)]"
    >
      {{ dog.displayName }}
    </h3>

    <p
      class="mt-2 text-xs text-white/80 uppercase tracking-wider drop-shadow-[0_1px_4px_rgba(0,0,0,0.6)]"
    >
      {{ sizeLabel }} · {{ dog.color }}
      @if (dog.areaLabel) {
        · {{ dog.areaLabel }}
      }
    </p>

    <p
      class="mt-1.5 text-[11px] text-white/70 uppercase tracking-wider drop-shadow-[0_1px_4px_rgba(0,0,0,0.6)]"
    >
      {{ dog.sightingCount }}
      {{ dog.sightingCount === 1 ? "sighting" : "sightings" }}
    </p>
  </div>
</a>
