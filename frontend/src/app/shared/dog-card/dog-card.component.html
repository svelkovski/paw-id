<a [routerLink]="['/dogs', dog.id]"
   class="block bg-bg-secondary border border-border-tertiary/50 rounded-lg overflow-hidden
          text-inherit transition-[transform,border-color] duration-150
          hover:border-border-primary hover:-translate-y-px">

  <!-- Photo area (or placeholder) with absolutely-positioned badge overlay -->
  <div class="relative h-[130px] bg-bg-tertiary flex items-center justify-center overflow-hidden">
    @if (photoUrl; as photo) {
      <img [src]="photo" [alt]="dog.displayName" loading="lazy"
           class="w-full h-full object-cover">
    } @else {
      <!-- Silhouette placeholder, tinted dark to blend with the card -->
      <svg class="w-14 h-14 opacity-95" viewBox="0 0 48 48" fill="none" aria-hidden="true">
        <circle cx="24" cy="24" r="22" fill="#33332F"/>
        <ellipse cx="24" cy="28" rx="12" ry="10" fill="#55534D"/>
        <circle cx="24" cy="18" r="8" fill="#55534D"/>
        <circle cx="20" cy="16" r="3" fill="#1C1C1A"/>
        <circle cx="28" cy="16" r="3" fill="#1C1C1A"/>
        <ellipse cx="24" cy="22" rx="4" ry="2.5" fill="#1C1C1A"/>
      </svg>
    }

    <span [class]="badgeClass" class="absolute top-2 left-2">
      {{ badgeLabel }}
    </span>
  </div>

  <!-- Info block -->
  <div class="px-3.5 pt-3 pb-3.5">
    <div class="text-[13px] font-medium text-text-primary">{{ dog.displayName }}</div>

    <div class="text-[11px] text-text-secondary mt-[3px]">
      {{ sizeLabel }} · {{ dog.color }}
      @if (dog.areaLabel) { · {{ dog.areaLabel }} }
    </div>

    <div class="text-[11px] text-accent-soft-fg mt-1">
      {{ dog.sightingCount }}
      {{ dog.sightingCount === 1 ? 'sighting' : 'sightings' }}
    </div>
  </div>
</a>
