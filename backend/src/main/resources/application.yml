server:
  port: 8080

spring:
  application:
    name: pawid-backend

  datasource:
    url: jdbc:h2:file:./data/pawid;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    repair-on-migrate: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

  h2:
    console:
      enabled: true
      path: /h2-console

pawid:
  uploads-dir: ./uploads
  cors-allowed-origins: http://localhost:4200
  jwt:
    secret: "pawid-jwt-secret-key-change-in-production-min-256-bits"
    expiration-ms: 86400000
