<nav class="sticky top-0 z-50 bg-bg-primary border-b border-border-tertiary/50">
  <div class="flex items-center justify-between px-8 py-3.5 max-md:px-4">

    <!-- Left: logo -->
    <a routerLink="/" aria-label="PawID home" (click)="closeMenu()">
      <app-logo></app-logo>
    </a>

    <!-- Center: desktop nav (hidden on mobile) -->
    <div class="flex gap-6 max-md:hidden">
      <a routerLink="/dogs" routerLinkActive="text-accent"
        class="text-sm text-text-secondary hover:text-text-primary transition-colors">
        Browse profiles
      </a>
      <a routerLink="/dogs/register" routerLinkActive="text-accent"
        class="text-sm text-text-secondary hover:text-text-primary transition-colors">
        Register a dog
      </a>
      <a routerLink="/map" routerLinkActive="text-accent"
        class="text-sm text-text-secondary hover:text-text-primary transition-colors">
        Map
      </a>
      <a routerLink="/about" routerLinkActive="text-accent"
        class="text-sm text-text-secondary hover:text-text-primary transition-colors">
        How it works
      </a>
    </div>

    <!-- Right side: auth buttons (desktop) / burger (mobile) -->
    <div class="flex items-center gap-2.5">
      <!-- Desktop auth -->
      <div class="flex items-center gap-2.5 max-md:hidden">
        @if (auth.isLoggedIn()) {
          <span class="text-sm text-text-secondary max-sm:hidden">
            {{ auth.user()!.displayName }}
          </span>
          <button (click)="auth.logout()" class="btn-ghost text-sm">
            Sign out
          </button>
        } @else {
          <a routerLink="/login" class="btn-ghost text-sm">Sign in</a>
          <a routerLink="/register" class="btn-primary text-sm">Sign up</a>
        }
      </div>

      <!-- Burger button (mobile only) -->
      <button type="button"
              (click)="toggleMenu()"
              [attr.aria-expanded]="menuOpen()"
              aria-label="Toggle menu"
              aria-controls="mobile-menu"
              class="md:hidden w-10 h-10 flex items-center justify-center
                     rounded-md text-text-primary
                     hover:bg-bg-secondary transition-colors">
        <!-- Hamburger / close icon — swap based on state -->
        @if (menuOpen()) {
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" aria-hidden="true">
            <path d="M6 6l12 12M6 18L18 6" />
          </svg>
        } @else {
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" aria-hidden="true">
            <path d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        }
      </button>
    </div>
  </div>

  <!-- Mobile dropdown panel -->
  @if (menuOpen()) {
    <div id="mobile-menu"
         class="md:hidden border-t border-border-tertiary/50 bg-bg-primary
                px-4 py-4 flex flex-col gap-1">
      <a routerLink="/dogs" routerLinkActive="text-accent bg-bg-secondary"
         (click)="closeMenu()"
         class="px-3 py-2.5 rounded-md text-sm text-text-secondary
                hover:bg-bg-secondary hover:text-text-primary transition-colors">
        Browse profiles
      </a>
      <a routerLink="/dogs/register" routerLinkActive="text-accent bg-bg-secondary"
         (click)="closeMenu()"
         class="px-3 py-2.5 rounded-md text-sm text-text-secondary
                hover:bg-bg-secondary hover:text-text-primary transition-colors">
        Register a dog
      </a>
      <a routerLink="/map" routerLinkActive="text-accent bg-bg-secondary"
         (click)="closeMenu()"
         class="px-3 py-2.5 rounded-md text-sm text-text-secondary
                hover:bg-bg-secondary hover:text-text-primary transition-colors">
        Map
      </a>
      <a routerLink="/about" routerLinkActive="text-accent bg-bg-secondary"
         (click)="closeMenu()"
         class="px-3 py-2.5 rounded-md text-sm text-text-secondary
                hover:bg-bg-secondary hover:text-text-primary transition-colors">
        How it works
      </a>

      <!-- Divider -->
      <div class="border-t border-border-tertiary/50 my-2"></div>

      <!-- Auth section -->
      @if (auth.isLoggedIn()) {
        <div class="px-3 py-2 text-xs text-text-muted uppercase tracking-wider">
          Signed in as {{ auth.user()!.displayName }}
        </div>
        <button type="button" (click)="logout()"
                class="px-3 py-2.5 rounded-md text-sm text-left text-text-secondary
                       hover:bg-bg-secondary hover:text-text-primary transition-colors">
          Sign out
        </button>
      } @else {
        <a routerLink="/login" (click)="closeMenu()"
           class="px-3 py-2.5 rounded-md text-sm text-text-secondary
                  hover:bg-bg-secondary hover:text-text-primary transition-colors">
          Sign in
        </a>
        <a routerLink="/register" (click)="closeMenu()"
           class="mt-1 px-3 py-2.5 rounded-md text-sm font-medium text-center
                  bg-accent text-white hover:bg-accent-dark transition-colors">
          Sign up
        </a>
      }
    </div>
  }
</nav>
